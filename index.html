<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>都道416号線と305号線の関係</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: 'Helvetica Neue', Arial, sans-serif;
      }
      #container {
        display: flex;
        height: 100vh;
        flex-direction: row;
      }
      #map {
        flex: 1;
        height: 100%;
      }
      
      /* ★PC版：フィルターがないからパネルは細めでいいわね！ */
      #panel {
        width: 350px;
        background-color: #ffffff;
        box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        box-sizing: border-box;
        z-index: 10;
        display: flex;
        flex-direction: column;
      }
      
      #panel-header {
        padding: 20px 20px 10px 20px;
        flex-shrink: 0;
      }
      
      #panel-content {
        padding: 0 20px 20px 20px;
        overflow-y: auto;
        flex: 1;
      }

      h3 {
        margin-top: 0;
        border-bottom: 2px solid #33c;
        padding-bottom: 8px;
        font-size: 16px;
      }
      
      /* 詳細情報の見出しデザイン */
      #info-box h4 {
        margin: 0 0 10px 0;
        font-size: 15px;
        color: #e0245e;
        border-bottom: 2px dashed #ccc;
        padding-bottom: 5px;
      }
      #info-content {
        font-size: 14px;
        color: #333;
        line-height: 1.5;
      }
      
      /* ★スマホ版レイアウト：パネルの高さは低めにしておくわよ！ */
      @media (max-width: 768px) {
        #container {
          flex-direction: column-reverse;
        }
        #panel {
          width: 100%;
          height: 25vh;
          display: block;
          overflow-y: auto;
        }
      }
    </style>
    <!-- ★ここにAPIキーを入れるのよ！ -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAtS9PympKieGJ8LvpIbqFn0A8l0AkJ7Qc&callback=initMap&v=weekly&libraries=marker" async defer></script>
  </head>
  <body>
    <div id="container">
      <div id="panel">
        <div id="panel-header">
          <h3>マップ詳細情報</h3>
        </div>

        <div id="panel-content">
          <div id="info-box">
            <h4>詳細情報</h4>
            <div id="info-content">
              <p>地図上の道路や交差点をクリックすると、ここに詳細が表示されるわよ！</p>
            </div>
          </div>
        </div>
      </div>

      <div id="map"></div>
    </div>

    <script>
      let map;
      let dataLayer;
      let selectedFeatureName = null;

      function showInfo(name, desc) {
        let safeName = name ? name.replace(/\\n|\n/g, '<br>') : '名称未設定';
        let contentHtml = `<strong style="display: block; line-height: 1.4;">${safeName}</strong>`;
        
        if (desc) {
          let safeDesc = desc.replace(/\\n|\n/g, '<br>');
          contentHtml += `<p style="margin-top: 8px;">${safeDesc}</p>`;
        } else {
          contentHtml += `<p style="margin-top: 8px;">特に説明はないみたいね。</p>`;
        }
        document.getElementById('info-content').innerHTML = contentHtml;
      }

      function clearInfo() {
        selectedFeatureName = null;
        dataLayer.setStyle(getFeatureStyle);
        document.getElementById('info-content').innerHTML = '<p>地図上の道路や交差点をクリックすると、ここに詳細が表示されるわよ！</p>';
      }

      function getFeatureStyle(feature) {
        const name = feature.getProperty("Name") || feature.getProperty("name");
        const isSelected = (selectedFeatureName && name === selectedFeatureName);
        const geometryType = feature.getGeometry().getType();

        let style = { visible: true };

        // 線のデータ（道路）だったら
        if (geometryType === 'LineString' || geometryType === 'MultiLineString') {
          style.strokeColor = isSelected ? "#FF0000" : "#0055FF";
          style.strokeWeight = isSelected ? 8 : 5;
          style.strokeOpacity = isSelected ? 1.0 : 0.7;
          style.zIndex = isSelected ? 20 : 10;
        } 
        // 点のデータ（交差点）だったら
        else if (geometryType === 'Point') {
          style.icon = {
            path: google.maps.SymbolPath.CIRCLE,
            fillColor: isSelected ? '#FF0000' : '#0055FF',
            fillOpacity: 0.9,
            strokeWeight: 2,
            strokeColor: '#FFFFFF',
            scale: isSelected ? 10 : 7
          };
          style.zIndex = isSelected ? 25 : 15;
        }

        return style;
      }

      async function initMap() {
        const Map = google.maps.Map;

        map = new Map(document.getElementById("map"), {
          // 初期位置の座標ね。表示したい場所に変えなさいよ！
          center: { lat: 35.700, lng: 139.740 }, 
          zoom: 13,
          // ★ここにマップIDを入れるの！
          mapId: "fb56929676bfd00e78e2f3fc", 
          mapTypeControl: false,
        });

        // 地図の何もないところをクリックしたら詳細表示を消すわ！
        map.addListener('click', clearInfo);

        // データレイヤーは1つで十分よ！
        dataLayer = new google.maps.Data({ map: map });
        dataLayer.setStyle(getFeatureStyle);

        // ★ここに読み込みたいGeoJSONのURLを書くのよ！ いくつ増やしてもOK！
        const geoJsonUrls = [
          "https://raw.githubusercontent.com/SNatsuyama/416305/main/meijidori.geojson"
        ];

        geoJsonUrls.forEach(url => {
          dataLayer.loadGeoJson(url);
        });

        // 道路か交差点がクリックされたときの処理ね！
        dataLayer.addListener('click', function(event) {
          const name = event.feature.getProperty("Name") || event.feature.getProperty("name");
          const desc = event.feature.getProperty("description");
          
          selectedFeatureName = name;
          dataLayer.setStyle(getFeatureStyle); // 色を赤に変えるわ！
          showInfo(name, desc); // パネルに詳細を出すの！
        });
      }

      window.onload = initMap;
    </script>
  </body>
</html>
